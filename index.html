<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>KMovies</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Header -->

  <header>

    <h1>KMovies</h1>

    <input
      type="text"
      id="searchBar"
      placeholder="Search movies..."
    >

  </header>


  <!-- Movies -->

  <main>

    <div
      class="movie-container"
      id="movieContainer"
    ></div>

  </main>


  <!-- Popup -->

  <div
    class="popup"
    id="popup"
  >

    <div
      class="popup-content"
      id="popupContent"
    >

    </div>

  </div>


  <!-- Script -->

  <script src="script.js"></script>

</body>

</html>
