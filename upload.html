<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Upload Movie</title>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


  <!-- STYLE -->

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      background: #111;

      color: white;

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: center;

      min-height: 100vh;

      padding: 20px;
    }

    .container {

      background: #1c1c1c;

      width: 100%;
      max-width: 500px;

      padding: 30px;

      border-radius: 15px;
    }

    h1 {

      text-align: center;

      margin-bottom: 25px;

      color: red;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 15px;

      border: none;

      border-radius: 8px;

      font-size: 16px;
    }

    button {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 8px;

      background: red;

      color: white;

      font-size: 18px;

      cursor: pointer;
    }

    button:hover {

      opacity: 0.9;
    }

    #status {

      margin-top: 20px;

      text-align: center;

      color: #ccc;

      line-height: 1.5;
    }

    @media (max-width: 600px) {

      .container {

        padding: 20px;
      }

      h1 {

        font-size: 28px;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Upload Movie</h1>


    <!-- TITLE -->

    <input
      type="text"
      id="title"
      placeholder="Movie Title"
    >


    <!-- IMDB ID -->

    <input
      type="text"
      id="imdb"
      placeholder="IMDb ID (example: tt15327088)"
    >


    <!-- FILE -->

    <input
      type="file"
      id="movieFile"
      accept="video/mp4"
    >


    <!-- BUTTON -->

    <button onclick="uploadMovie()">
      Upload Movie
    </button>


    <!-- STATUS -->

    <p id="status"></p>

  </div>


  <!-- SCRIPT -->

  <script>

    // SUPABASE CONFIG

    const SUPABASE_URL =
      "https://ubdckzxawjrcmbdizrfl.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViZGNrenhhd2pyY21iZGl6cmZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTUyNjUsImV4cCI6MjA5NDA5MTI2NX0.v_-9yjIqq1NzdR0IAqxvBUuOhYMxWptb_8IkOa71zI0";


    const supabaseClient =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );


    // UPLOAD FUNCTION

    async function uploadMovie() {

      const title =
        document.getElementById("title").value.trim();

      const imdbID =
        document.getElementById("imdb").value.trim();

      const file =
        document.getElementById("movieFile")
          .files[0];

      const status =
        document.getElementById("status");


      // VALIDATION

      if (!title || !imdbID || !file) {

        status.innerText =
          "Please fill all fields.";

        return;
      }


      status.innerText =
        "Uploading movie...";


      // UNIQUE FILE NAME

      const fileName =
        Date.now() + "-" + file.name;


      // UPLOAD TO STORAGE

      const {
        data: uploadData,
        error: uploadError
      } =
        await supabaseClient.storage
          .from("movies")
          .upload(fileName, file);


      // HANDLE STORAGE ERROR

      if (uploadError) {

        console.log(uploadError);

        status.innerText =
          "Movie upload failed.";

        return;
      }


      // GET PUBLIC URL

      const {
        data: publicUrlData
      } =
        supabaseClient.storage
          .from("movies")
          .getPublicUrl(fileName);


      const publicUrl =
        publicUrlData.publicUrl;


      // INSERT DATABASE ROW

      const {
        error: dbError
      } =
        await supabaseClient
          .from("movies")
          .insert([
            {
              imdb_id: imdbID,
              title: title,
              video_url: publicUrl
            }
          ]);


      // HANDLE DATABASE ERROR

      if (dbError) {

        console.log(dbError);

        status.innerText =
          "Database insert failed.";

        return;
      }


      // SUCCESS

      status.innerText =
        "Movie uploaded successfully!";


      // CLEAR FIELDS

      document.getElementById("title").value = "";

      document.getElementById("imdb").value = "";

      document.getElementById("movieFile").value = "";
    }

  </script>

</body>

</html>
